name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="openstash_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/MiguelAPerez/openstash/internal/cli.version=${version}" -o dist/openstash ./cmd/openstash
          tar -czf "dist/${name}.tar.gz" -C dist openstash
          rm dist/openstash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: openstash-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/openstash_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz
